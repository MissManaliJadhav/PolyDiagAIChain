<!DOCTYPE html>
<html>
<head>
<title>Patient Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<h2 class="mb-4 text-center">Patient Diagnosis History</h2>

<div class="card shadow">
<div class="card-body">

<table class="table table-striped table-hover">

<thead class="table-dark">
<tr>
<th>Disease</th>
<th>Result</th>
<th>Trust Score</th>
<th>Blockchain Hash</th>
</tr>
</thead>

<tbody>

{% for r in records %}
<tr>
<td>{{ r.disease }}</td>
<td>{{ r.result }}</td>
<td>
<span class="badge bg-success">{{ r.trust }}</span>
</td>
<td style="font-size:12px">{{ r.hash }}</td>
</tr>
{% endfor %}

</tbody>

</table>

</div>
</div>

<div class="text-center mt-4">
<a href="/logout" class="btn btn-danger">Logout</a>
</div>

</div>

</body>
</html>
