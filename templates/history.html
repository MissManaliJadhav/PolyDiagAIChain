<!DOCTYPE html>
<html>
<head>
<title>PolyDiagAI-Chain-Blockchain History</title>

<style>
body{
    font-family:Arial;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
    text-align:center;
}

table{
    margin:auto;
    border-collapse:collapse;
    width:80%;
    background:white;
    color:black;
}

th,td{
    padding:12px;
    border:1px solid #ccc;
}

th{
    background:#2c5364;
    color:white;
}
</style>

</head>

<body>

<h1>🧾 Blockchain Medical History</h1>

<table>
<tr>
<th>Patient</th>
<th>Disease</th>
<th>Result</th>
<th>Timestamp</th>
</tr>
<tbody>
{% if records %}
    {% for r in records %}
    <tr>
        <td>{{ r.patient }}</td>
        <td>{{ r.disease }}</td>
        <td>{{ r.result }}</td>
        <td>{{ r.timestamp }}</td>
    </tr>
    {% endfor %}
{% else %}
<tr>
    <td colspan="4" style="text-align:center;">
        No Blockchain Records Found
    </td>
</tr>
{% endif %}
</tbody>
</table>
</body>
</html>
